<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>ERP BTP — Login Explorations</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f3ee;
    --bg-warm: #efe9df;
    --paper: #ffffff;
    --ink: #1a1814;
    --ink-2: #46423b;
    --ink-3: #8a8378;
    --line: #e4ddd1;
    --line-2: #d6cebf;
    --ocre: oklch(0.62 0.12 50);
    --ocre-deep: oklch(0.50 0.13 45);
    --ocre-soft: oklch(0.92 0.04 70);
    --green: oklch(0.55 0.08 150);
    --night: #1f1d1a;
  }
  html, body { margin: 0; padding: 0; background: #1a1814; }
  body { font-family: 'IBM Plex Sans', sans-serif; color: var(--ink); }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="login-variants.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { LoginClassique, LoginSplit, LoginZellige } = window;

  function App() {
    return (
      <DesignCanvas title="ERP BTP — Page de connexion" subtitle="3 directions visuelles — palette terre marocaine">
        <DCSection id="logins" title="Variantes" subtitle="Sélectionnez une direction ou mixez les éléments">
          <DCArtboard id="v1" label="01 — Classique chantier" width={1280} height={820}>
            <LoginClassique />
          </DCArtboard>
          <DCArtboard id="v2" label="02 — Split éditorial" width={1280} height={820}>
            <LoginSplit />
          </DCArtboard>
          <DCArtboard id="v3" label="03 — Zellige discret" width={1280} height={820}>
            <LoginZellige />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
